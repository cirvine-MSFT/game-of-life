name: Reject external pull requests

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  close-external-pr:
    name: Close external pull request
    if: ${{ github.event.pull_request.user.login != github.repository_owner && github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Close pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          COMMENT_BODY: |
            🤖 *AI response on behalf of Casey*

            Thanks for the contribution. This repository is not accepting outside pull requests right now. Please open an issue instead if you want to share feedback or context.
        run: |
          gh pr comment "${PR_URL}" --body "${COMMENT_BODY}"
          gh pr close "${PR_URL}"

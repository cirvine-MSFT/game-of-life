name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate starter files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            ".gitignore"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/feature_request.md"
            ".github/ISSUE_TEMPLATE/bug_report.md"
            ".github/CODEOWNERS"
            ".github/dependabot.yml"
          )

          for file in "${required_files[@]}"; do
            test -f "$file"
          done

          grep -qi "game of life" README.md

  rust-checks:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Build
        run: cargo build --release

      - name: Console binary smoke test
        shell: bash
        run: ./scripts/smoke-test.sh

      - name: Example boards end-to-end test
        shell: bash
        run: ./scripts/examples-smoke-test.sh

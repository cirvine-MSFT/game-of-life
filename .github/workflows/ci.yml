name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate starter files
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "README.md"
            ".gitignore"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/feature_request.md"
            ".github/ISSUE_TEMPLATE/bug_report.md"
            ".github/CODEOWNERS"
            ".github/dependabot.yml"
          )

          for file in "${required_files[@]}"; do
            test -f "$file"
          done

          grep -qi "game of life" README.md
